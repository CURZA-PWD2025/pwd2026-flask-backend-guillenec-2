info:
  name: crear_categoria
  type: http
  seq: 3

http:
  method: POST
  url: "{{BACKEND_URL}}/categorias/"
  body:
    type: json
    data: |-
      {
        "nombre":"bebidas sin alchooos",
        "descripcion":"Bebidas sin alcohol"
      }
  auth:
    type: bearer
    token: "{{BEAR_TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
